<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XK TEAM • Module License Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at 20% 30%, #0A0F1E, #03060C);
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        .glass-card {
            background: rgba(12, 20, 35, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        .btn-module {
            background: rgba(188,19,254,0.2);
            border: 1px solid #bc13fe;
            transition: 0.2s;
        }
        .btn-module:hover {
            background: #bc13fe;
            transform: scale(0.98);
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

<div class="max-w-6xl mx-auto">
    <div class="glass-card p-6 mb-8 text-center">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">XK TEAM MODULE CENTER</h1>
        <p class="text-slate-400 mt-2">Generate license keys untuk 5 module premium • Free tier juga tersedia</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- FORM GENERATE -->
        <div class="glass-card p-6">
            <h2 class="text-xl font-bold text-cyan-400 mb-4"><i class="fas fa-key mr-2"></i> Generate License</h2>
            <div class="mb-4">
                <label class="block text-slate-300 text-sm mb-1">Pilih Module</label>
                <select id="moduleSelect" class="w-full p-2 rounded-lg bg-slate-900 border border-purple-500 text-white">
                    <option value="aquarius">🌊 Aquarius</option>
                    <option value="sagitarius">🏹 Sagitarius</option>
                    <option value="pisces">🐟 Pisces</option>
                    <option value="capricorn">🐐 Capricorn</option>
                    <option value="aries">🔥 Aries</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-slate-300 text-sm mb-1">Tipe Lisensi</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2"><input type="radio" name="licenseType" value="free" checked> <span class="text-green-400">Free (Tanpa Verifikasi)</span></label>
                    <label class="flex items-center gap-2"><input type="radio" name="licenseType" value="premium"> <span class="text-yellow-400">Premium (Key + Expired)</span></label>
                </div>
            </div>
            <div id="premiumFields" style="display: none;">
                <div class="mb-4">
                    <label class="block text-slate-300 text-sm mb-1">Expired Date (YYYY-MM-DD)</label>
                    <input type="date" id="expiredDate" class="w-full p-2 rounded-lg bg-slate-900 border border-purple-500 text-white">
                </div>
                <div class="mb-4">
                    <label class="block text-slate-300 text-sm mb-1">Device Limit (opsional)</label>
                    <input type="number" id="deviceLimit" value="1" min="1" class="w-full p-2 rounded-lg bg-slate-900 border border-purple-500 text-white">
                </div>
            </div>
            <button id="generateBtn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 rounded-xl transition">GENERATE LICENSE</button>
            <div id="resultMsg" class="mt-4 text-sm text-center"></div>
        </div>

        <!-- LIST LISENSI -->
        <div class="glass-card p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-cyan-400"><i class="fas fa-database mr-2"></i> License Inventory</h2>
                <button id="refreshBtn" class="bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-lg text-xs"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            <div class="overflow-x-auto max-h-96 overflow-y-auto">
                <table class="w-full text-sm">
                    <thead class="text-slate-400 border-b border-slate-700">
                        <tr><th class="text-left p-2">Module</th><th class="text-left p-2">Key</th><th class="text-left p-2">Expired</th><th class="text-left p-2">Status</th><th class="text-center p-2">Action</th></tr>
                    </thead>
                    <tbody id="licenseTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB7zaVclrD5EG2oBTv2LupjKbXNLIw33H0",
        authDomain: "module-database-d76ed.firebaseapp.com",
        databaseURL: "https://module-database-d76ed-default-rtdb.firebaseio.com",
        projectId: "module-database-d76ed",
        storageBucket: "module-database-d76ed.appspot.com",
        messagingSenderId: "1094996529231",
        appId: "1:1094996529231:web:1234567890abcdef"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const moduleSelect = document.getElementById('moduleSelect');
    const licenseTypeRadios = document.querySelectorAll('input[name="licenseType"]');
    const premiumFields = document.getElementById('premiumFields');
    const generateBtn = document.getElementById('generateBtn');
    const resultMsg = document.getElementById('resultMsg');
    const refreshBtn = document.getElementById('refreshBtn');
    const tbody = document.getElementById('licenseTableBody');

    licenseTypeRadios.forEach(radio => {
        radio.addEventListener('change', () => {
            premiumFields.style.display = radio.value === 'premium' ? 'block' : 'none';
        });
    });

    async function generateLicense() {
        const module = moduleSelect.value;
        const type = document.querySelector('input[name="licenseType"]:checked').value;
        let key = "", expired = "", deviceLimit = 1;
        if (type === 'premium') {
            const expDate = document.getElementById('expiredDate').value;
            const limit = document.getElementById('deviceLimit').value;
            if (!expDate) { alert("Isi tanggal expired!"); return; }
            expired = expDate;
            deviceLimit = parseInt(limit);
            key = "XK-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        } else {
            // Free: key = "FREE"
            key = "FREE";
            expired = "unlimited";
            deviceLimit = 999;
        }
        const nodeName = `module_${module}`;
        const data = {
            key: key,
            type: type,
            expired: expired,
            device_limit: deviceLimit,
            status: "active",
            createdAt: new Date().toISOString()
        };
        try {
            await db.ref(`${nodeName}/${key}`).set(data);
            resultMsg.innerHTML = `<span class="text-green-400">✅ License generated for ${module.toUpperCase()}! Key: ${key}</span>`;
            loadLicenses();
            if (type === 'premium') {
                document.getElementById('expiredDate').value = '';
                document.getElementById('deviceLimit').value = '1';
            }
        } catch(e) {
            resultMsg.innerHTML = `<span class="text-red-400">❌ Error: ${e.message}</span>`;
        }
    }

    async function loadLicenses() {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4">Loading...</td></tr>';
        const modules = ['aquarius', 'sagitarius', 'pisces', 'capricorn', 'aries'];
        let allData = [];
        for (const mod of modules) {
            const snapshot = await db.ref(`module_${mod}`).once('value');
            const data = snapshot.val();
            if (data) {
                for (const [key, val] of Object.entries(data)) {
                    allData.push({ module: mod, key: key, ...val });
                }
            }
        }
        if (allData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4 text-slate-500">No licenses found</td></tr>';
            return;
        }
        tbody.innerHTML = '';
        allData.forEach(item => {
            const row = tbody.insertRow();
            row.insertCell(0).innerHTML = `<span class="capitalize">${item.module}</span>`;
            row.insertCell(1).innerHTML = `<code class="text-xs bg-black px-1 rounded">${item.key}</code>`;
            row.insertCell(2).innerHTML = item.expired === 'unlimited' ? '∞ Free' : item.expired;
            row.insertCell(3).innerHTML = `<span class="text-green-400">${item.status}</span>`;
            const delBtn = document.createElement('button');
            delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
            delBtn.className = 'text-red-400 hover:text-red-300';
            delBtn.onclick = async () => {
                if (confirm(`Hapus license ${item.key}?`)) {
                    await db.ref(`module_${item.module}/${item.key}`).remove();
                    loadLicenses();
                }
            };
            const cell = row.insertCell(4);
            cell.className = 'text-center';
            cell.appendChild(delBtn);
        });
    }

    generateBtn.addEventListener('click', generateLicense);
    refreshBtn.addEventListener('click', loadLicenses);
    loadLicenses();
</script>
</body>
</html>
